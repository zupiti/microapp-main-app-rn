<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Arquitetura Microapps React Native — POC</title>
<style>
  :root {
    --bg: #0b0f17;
    --bg-soft: #111826;
    --panel: #151d2c;
    --border: #23304a;
    --text: #e8ecf3;
    --muted: #93a1b8;
    --accent: #5aa9ff;
    --accent2: #7ee0c3;
    --accent3: #ffb454;
    --accent4: #ff6f91;
    --mono: 'SF Mono', 'Fira Code', Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    height: 100%;
    overflow: hidden;
  }
  #deck {
    position: relative;
    width: 100vw;
    height: 100vh;
  }
  .slide {
    position: absolute;
    inset: 0;
    display: none;
    flex-direction: column;
    padding: 56px 84px;
    opacity: 0;
    transform: translateX(24px);
    transition: opacity .35s ease, transform .35s ease;
    overflow-y: auto;
  }
  .slide.active {
    display: flex;
    opacity: 1;
    transform: translateX(0);
  }
  .kicker {
    font-size: 13px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 700;
    margin-bottom: 10px;
  }
  h1 {
    font-size: 44px;
    margin: 0 0 6px;
    font-weight: 800;
    letter-spacing: -0.01em;
  }
  h2 {
    font-size: 32px;
    margin: 0 0 22px;
    font-weight: 800;
    letter-spacing: -0.01em;
  }
  .subtitle {
    font-size: 18px;
    color: var(--muted);
    margin-bottom: 28px;
    max-width: 820px;
  }
  .grid {
    display: grid;
    gap: 18px;
  }
  .grid-2 { grid-template-columns: 1fr 1fr; }
  .grid-3 { grid-template-columns: 1fr 1fr 1fr; }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px 22px;
  }
  .card h3 {
    margin: 0 0 8px;
    font-size: 17px;
    color: var(--text);
  }
  .card p, .card li {
    color: var(--muted);
    font-size: 14.5px;
    line-height: 1.55;
  }
  .pill {
    display: inline-block;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: .04em;
    padding: 3px 10px;
    border-radius: 999px;
    margin-bottom: 10px;
  }
  .pill.blue { background: rgba(90,169,255,.14); color: var(--accent); }
  .pill.green { background: rgba(126,224,195,.14); color: var(--accent2); }
  .pill.orange { background: rgba(255,180,84,.14); color: var(--accent3); }
  .pill.pink { background: rgba(255,111,145,.14); color: var(--accent4); }
  .pill.red { background: rgba(255,111,145,.14); color: var(--accent4); }

  code, pre, .mono {
    font-family: var(--mono);
  }
  pre {
    background: #0a0e16;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 18px;
    font-size: 13.5px;
    line-height: 1.65;
    overflow-x: auto;
    color: #d7e2f5;
  }
  pre .c { color: #6f819e; } /* comment */
  pre .k { color: var(--accent); } /* keyword/command */
  pre .s { color: var(--accent2); } /* string/path */
  code.inline {
    background: rgba(255,255,255,.07);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 1px 6px;
    font-size: 13px;
    color: var(--accent2);
  }

  /* Architecture tree */
  .tree {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
  }
  .node {
    border-radius: 12px;
    padding: 12px 22px;
    font-weight: 700;
    font-size: 15px;
    text-align: center;
    border: 1px solid var(--border);
  }
  .node.main { background: linear-gradient(135deg, #1b2b46, #16233a); color: var(--accent); border-color: #2a3f63; }
  .node.app { background: linear-gradient(135deg, #16342c, #123326); color: var(--accent2); border-color: #1e4a3c; }
  .node.front { background: linear-gradient(135deg, #3a2a12, #33240f); color: var(--accent3); border-color: #55401c; }
  .row { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
  .connector { width: 2px; height: 18px; background: var(--border); }
  .branch { display: flex; flex-direction: column; align-items: center; gap: 6px; }

  table.cmp {
    width: 100%;
    border-collapse: collapse;
    font-size: 14.5px;
  }
  table.cmp th, table.cmp td {
    text-align: left;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
  }
  table.cmp th { color: var(--muted); font-weight: 600; font-size: 12.5px; text-transform: uppercase; letter-spacing: .04em; }
  table.cmp td.k { color: var(--accent); font-weight: 700; }
  table.cmp td.v { color: var(--text); }

  ul.bullets { margin: 0; padding-left: 20px; }
  ul.bullets li { color: var(--muted); margin-bottom: 8px; font-size: 15px; line-height: 1.5; }
  ul.bullets li strong { color: var(--text); }

  .badge-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 4px; }
  .badge {
    background: var(--bg-soft);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 6px 14px;
    font-size: 13px;
    color: var(--text);
  }

  footer.foot {
    margin-top: auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12.5px;
    color: var(--muted);
    padding-top: 18px;
  }

  /* Progress + controls */
  #progress {
    position: fixed;
    top: 0; left: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width .3s ease;
    z-index: 20;
  }
  #nav {
    position: fixed;
    bottom: 22px;
    right: 30px;
    display: flex;
    align-items: center;
    gap: 12px;
    z-index: 20;
    font-size: 13px;
    color: var(--muted);
    background: rgba(21,29,44,.85);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 8px 16px;
    backdrop-filter: blur(6px);
  }
  #nav button {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    width: 32px;
    height: 32px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #nav button:hover { border-color: var(--accent); color: var(--accent); }
  #counter { min-width: 46px; text-align: center; }

  .flow-steps { display: flex; flex-direction: column; gap: 10px; }
  .flow-step {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
  }
  .flow-num {
    flex: 0 0 auto;
    width: 26px; height: 26px;
    border-radius: 50%;
    background: var(--accent);
    color: #0b0f17;
    font-weight: 800;
    font-size: 13px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .flow-step .t { color: var(--text); font-weight: 700; font-size: 14.5px; margin-bottom: 2px; }
  .flow-step .d { color: var(--muted); font-size: 13.5px; }

  .warn {
    border-left: 3px solid var(--accent3);
    background: rgba(255,180,84,.08);
    border-radius: 0 10px 10px 0;
    padding: 12px 16px;
    font-size: 14px;
    color: #f2d9ab;
  }
  .ok {
    border-left: 3px solid var(--accent2);
    background: rgba(126,224,195,.08);
    border-radius: 0 10px 10px 0;
    padding: 12px 16px;
    font-size: 14px;
    color: #cdeee0;
  }
</style>
</head>
<body>

<div id="progress"></div>
<div id="deck"></div>

<div id="nav">
  <button id="prevBtn" title="Anterior">&#8249;</button>
  <span id="counter">1 / 17</span>
  <button id="nextBtn" title="Próximo">&#8250;</button>
</div>

  <div class="card">

// 5. Yarn Workspaces sem node_modules recursivo
`

  <span class="s">"microfront1-rn"</span>, <span class="s">"microfront2-rn"</span>,
  <span class="s">"shared-rn"</span>
],
<span class="k">"resolutions"</span>: {

</div>

`

    <h3>Scaffold</h3>
    <pre style="margin:0"><span class="k">npx</span> create-react-native-library@latest microfront1 <span class="k">--local</span></pre>

</div>
<table class="cmp" style="margin-top:18px">

// 7. Arquitetura interna do microapp
`
<div class="kicker">Camada: feature module</div>
<h2>Arquitetura interna de cada microapp</h2>
<p class="subtitle" style="margin-bottom:14px">Padrão obrigatório em <code class="inline">microapp1-rn</code>, <code class="inline">microapp2-rn</code> e <code class="inline">microapp3-rn</code> — alinhado ao módulo de referência de eleições.</p>

// 8. Diretrizes de hooks
`
<div class="kicker">Camada: feature module · hooks</div>
<h2>Diretrizes de hooks</h2>
<div class="grid grid-2">
  <div class="card">
    <div class="pill green">Fazer</div>
    <ul class="bullets">
      <li>Uma responsabilidade: <code class="inline">use-&lt;domínio&gt;-&lt;ação&gt;.ts</code></li>

      <li>React dentro de <code class="inline">utils/</code></li>

];

let current = 0;
const deck = document.getElementById('deck');

slides.forEach((html, i) => {
  const el = document.createElement('div');
  el.className = 'slide' + (i === 0 ? ' active' : '');
  el.innerHTML = html;
  deck.appendChild(el);
});

const slideEls = document.querySelectorAll('.slide');
const counter = document.getElementById('counter');
const progress = document.getElementById('progress');

function render() {
  slideEls.forEach((el, i) => el.classList.toggle('active', i === current));
  counter.textContent = (current + 1) + ' / ' + slideEls.length;
  progress.style.width = ((current + 1) / slideEls.length * 100) + '%';
}

function go(delta) {
  current = Math.min(Math.max(current + delta, 0), slideEls.length - 1);
  render();
}

document.getElementById('prevBtn').addEventListener('click', () => go(-1));
document.getElementById('nextBtn').addEventListener('click', () => go(1));

document.addEventListener('keydown', (e) => {
  if (['ArrowRight', 'PageDown', ' '].includes(e.key)) { go(1); }
  if (['ArrowLeft', 'PageUp'].includes(e.key)) { go(-1); }
  if (e.key === 'Home') { current = 0; render(); }
  if (e.key === 'End') { current = slideEls.length - 1; render(); }
});

deck.addEventListener('click', (e) => {
  const rect = deck.getBoundingClientRect();
  const x = e.clientX - rect.left;
  if (x > rect.width * 0.85) go(1);
  else if (x < rect.width * 0.15) go(-1);
});

render();
</script>
